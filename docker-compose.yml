services:
  api:
    build:
      context: ./apps/api
      target: deps
    ports:
      - '4000:4000'
    env_file:
      - ./apps/api/.env.development
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev

  web:
    build:
      context: ./apps/web
      target: deps
    ports:
      - '3000:3000'
    env_file:
      - ./apps/web/.env.development
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - api
