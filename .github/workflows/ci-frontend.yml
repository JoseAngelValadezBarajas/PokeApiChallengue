name: CI Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  test:
    name: Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint --workspace apps/web

      - name: Run tests
        run: npm run test --workspace apps/web

      - name: Build
        run: npm run build --workspace apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: https://dhuv2netenk87.cloudfront.net
